<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <radialGradient id="void" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0B101A"/>
      <stop offset="60%" stop-color="#05070D"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8A2BE2" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00F0FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0.4"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="url(#gridGrad)" stroke-width="1"/>
    </pattern>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="300" fill="url(#void)"/>
  <rect width="800" height="300" fill="url(#grid)"/>

  <g transform="translate(0, 150) rotate(-15) scale(1, 0.4)">
    <circle cx="400" cy="0" r="300" fill="none" stroke="#8A2BE2" stroke-width="2" opacity="0.3"/>
    <circle cx="400" cy="0" r="250" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.2"/>
    <circle cx="400" cy="0" r="200" fill="none" stroke="#FF00FF" stroke-width="3" opacity="0.1"/>
  </g>

  <rect x="0" y="295" width="800" height="5" fill="url(#glow)"/>

  <text x="400" y="140" font-family="'Courier New', Courier, monospace" font-size="64" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="8" filter="url(#neonGlow)">NEXUSMON</text>
  <text x="400" y="140" font-family="'Courier New', Courier, monospace" font-size="64" font-weight="900" fill="#E0E5EC" text-anchor="middle" letter-spacing="8">NEXUSMON</text>

  <text x="400" y="190" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="bold" fill="#00F0FF" text-anchor="middle" letter-spacing="12" filter="url(#neonGlowCyan)">VOID</text>
  <text x="400" y="190" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="12">VOID</text>

  <text x="400" y="250" font-family="sans-serif" font-size="12" fill="#42556B" text-anchor="middle" letter-spacing="4">SYSTEM // ARISE // JACK IN</text>

  <path d="M 50 150 L 150 150" stroke="#00F0FF" stroke-width="2" opacity="0.5"/>
  <circle cx="150" cy="150" r="4" fill="#00F0FF"/>
  <path d="M 750 150 L 650 150" stroke="#FF00FF" stroke-width="2" opacity="0.5"/>
  <circle cx="650" cy="150" r="4" fill="#FF00FF"/>

  <circle cx="400" cy="50" r="8" fill="#8A2BE2" opacity="0.8" filter="url(#neonGlow)"/>
  <path d="M 400 58 L 400 90" stroke="#8A2BE2" stroke-width="1" opacity="0.5"/>

</svg>
